const canvas=document.querySelector('#canvas'),ctx=canvas.getContext('2d'),game=document.querySelector('#game');let W,H,DPR,ground,playing=false,score=0,best=+(localStorage.getItem('neko-best')||0),speed=10,last=0,spawn=0,shake=0,level=1;const imgs={run1:new Image(),run2:new Image(),duck:new Image(),jump:new Image()};imgs.run1.src='assets/runner.png';imgs.run2.src='assets/run-arm.png';imgs.duck.src='assets/duck.png';imgs.jump.src='assets/jump.png';const crop={run1:[137,25,905,1153],run2:[137,25,905,1153],duck:[52,183,1165,910],jump:[87,63,902,1012]};

addEventListener('keydown',e=>{if(['Space','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();if(e.code==='Space'||e.code==='ArrowUp')jump();if(e.code==='ArrowDown')duck(true)});addEventListener('keyup',e=>{if(e.code==='ArrowDown')duck(false)});document.querySelector('#start').onclick=reset;document.querySelector('#jump').ontouchstart=e=>{e.preventDefault();jump()};document.querySelector('#duck').ontouchstart=e=>{e.preventDefault();duck(true)};document.querySelector('#duck').ontouchend=e=>{e.preventDefault();duck(false)};canvas.addEventListener('pointerdown',jump);

function spawnObstacle(){let pool=score<180?['barrier','spike','orb']:score<500?['barrier','spike','orb','drone','laser']:['barrier','spike','orb','drone','laser','wall'];let type=pool[Math.floor(Math.random()*pool.length)],o;if(type==='drone')o={x:W+30,y:ground-(108+Math.random()*25),w:70,h:34,type};else if(type==='laser')o={x:W+30,y:ground-126,w:92,h:26,type};else if(type==='spike')o={x:W+30,y:ground-35,w:56+Math.random()*25,h:35,type};else if(type==='orb')o={x:W+30,y:ground-48,w:48,h:48,type,spin:0};else if(type==='wall')o={x:W+30,y:ground-88,w:43,h:88,type};else o={x:W+30,y:ground-(48+Math.random()*25),w:38+Math.random()*24,h:48+Math.random()*25,type};obstacles.push(o);if(score>450&&Math.random()<.22&&['barrier','spike','orb'].includes(type))obstacles.push({...o,x:o.x+o.w+55+Math.random()*28,w:type==='spike'?46:o.w});spawn=Math.max(30,58+Math.random()*55-Math.min(score/70,30))}
function city(t){ctx.fillStyle='#0d0e20';for(let i=0;i<12;i++){let x=((i*137-t*.04)%(W+180))-80,h=90+(i*47%170);ctx.fillRect(x,ground-h,105,h);ctx.fillStyle=i%2?'#ff4fe120':'#baff4a20';for(let yy=ground-h+16;yy<ground-15;yy+=23)for(let xx=x+13;xx<x+90;xx+=25)if((xx+yy+i)%3)ctx.fillRect(xx,yy,7,3);ctx.fillStyle='#0d0e20'}ctx.fillStyle='#15132b';for(let i=0;i<9;i++){let x=((i*190-t*.12)%(W+250))-100,h=65+(i*31%105);ctx.fillRect(x,ground-h,145,h)}ctx.strokeStyle='#ff4fe155';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,ground-25);ctx.lineTo(W,ground-25);ctx.stroke()}

function drawPlayer(t){const scale=.1215,duckScale=.098;let cx=player.x+62,cy,rot=0,bob=0,phase=t*(.022+speed*.0012);ctx.save();if(player.jumping){cy=player.y+62;rot=Math.max(-.1,Math.min(.1,player.vy*.007));ctx.translate(cx,cy);ctx.rotate(rot);let squash=1-Math.min(Math.abs(player.vy)/95,.055);ctx.scale(1/squash,squash);paintSprite(imgs.jump,'jump',0,0,scale)}else if(player.duck){cy=ground-(crop.duck[3]*duckScale)/2-2;ctx.translate(cx+4,cy);ctx.rotate(-.02);paintSprite(imgs.duck,'duck',0,0,duckScale)}else{cy=ground-(crop.run1[3]*scale)/2;bob=playing?Math.abs(Math.sin(phase))*3:0;rot=playing?Math.sin(phase)*.01:0;ctx.translate(cx,cy+bob);ctx.rotate(rot);let sx=1+Math.sin(phase*2)*.012,sy=1-Math.sin(phase*2)*.01;ctx.scale(sx,sy);let frameTime=105-Math.min(speed*2,28),cycle=t/frameTime,p=cycle%1,second=Math.floor(cycle)%2===1,blend=Math.max(0,Math.min(1,(p-.7)/.3));if(second){paintSprite(imgs.run2,'run2',0,0,scale,1-blend);paintSprite(imgs.run1,'run1',0,0,scale,blend)}else{paintSprite(imgs.run1,'run1',0,0,scale,1-blend);paintSprite(imgs.run2,'run2',0,0,scale,blend)}if(playing&&Math.sin(phase)>.82&&Math.random()<.32)particles.push({x:player.x+25,y:ground-8,vx:-2-Math.random()*3,vy:-Math.random(),life:16,c:'#ff4fe1'})}ctx.restore()}
function drawObstacle(o){ctx.save();if(o.type==='drone'){ctx.shadowBlur=16;ctx.shadowColor='#ff4fe1';ctx.fillStyle='#27223b';ctx.beginPath();ctx.moveTo(o.x,o.y+10);ctx.lineTo(o.x+16,o.y);ctx.lineTo(o.x+56,o.y);ctx.lineTo(o.x+68,o.y+15);ctx.lineTo(o.x+52,o.y+30);ctx.lineTo(o.x+17,o.y+30);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4fe1';ctx.fillRect(o.x+23,o.y+12,23,5)}else if(o.type==='laser'){ctx.shadowBlur=18;ctx.shadowColor='#ff304f';ctx.fillStyle='#ff304f';ctx.fillRect(o.x,o.y+9,o.w,7);ctx.fillStyle='#41405b';ctx.fillRect(o.x-7,o.y,10,o.h);ctx.fillRect(o.x+o.w-3,o.y,10,o.h)}else if(o.type==='spike'){ctx.fillStyle='#baff4a';let n=Math.max(2,Math.floor(o.w/18));for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(o.x+i*o.w/n,o.y+o.h);ctx.lineTo(o.x+(i+.5)*o.w/n,o.y);ctx.lineTo(o.x+(i+1)*o.w/n,o.y+o.h);ctx.fill()}}else if(o.type==='orb'){o.spin+=.08;ctx.translate(o.x+24,o.y+24);ctx.rotate(o.spin);ctx.strokeStyle='#ff4fe1';ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,0,19,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#baff4a';ctx.fillRect(-4,-22,8,44);ctx.fillRect(-22,-4,44,8)}else{ctx.fillStyle=o.type==='wall'?'#372943':'#29243b';ctx.fillRect(o.x,o.y,o.w,o.h);ctx.fillStyle='#ff4fe1';for(let y=o.y+8;y<o.y+o.h;y+=18)ctx.fillRect(o.x,y,o.w,5);ctx.strokeStyle='#baff4a';ctx.strokeRect(o.x+4,o.y+4,o.w-8,o.h-8)}ctx.restore()}
const runLegImg=new Image();runLegImg.src='assets/run2.png';crop.runLeg=[96,30,885,1160];
function drawPlayer(t){const scale=.1215,duckScale=.098,cx=player.x+62,phase=t*(.022+speed*.0012);ctx.save();if(player.jumping){let cy=player.y+62,rot=Math.max(-.1,Math.min(.1,player.vy*.007)),squash=1-Math.min(Math.abs(player.vy)/95,.055);ctx.translate(cx,cy);ctx.rotate(rot);ctx.scale(1/squash,squash);paintSprite(imgs.jump,'jump',0,0,scale)}else if(player.duck){let cy=ground-(crop.duck[3]*duckScale)/2-2;ctx.translate(cx+4,cy);ctx.rotate(-.02);paintSprite(imgs.duck,'duck',0,0,duckScale)}else{let bob=playing?Math.abs(Math.sin(phase))*3:0;ctx.translate(cx,ground+bob);ctx.rotate(playing?Math.sin(phase)*.01:0);let frames=[[imgs.run1,'run1'],[imgs.run2,'run2'],[runLegImg,'runLeg'],[imgs.run2,'run2']],frameTime=Math.max(92,138-speed*1.7),cycle=t/frameTime,index=Math.floor(cycle)%4,p=cycle%1,next=(index+1)%4,blend=Math.max(0,Math.min(1,(p-.72)/.28));function groundFrame(f,a){let c=crop[f[1]],dw=c[2]*scale,dh=c[3]*scale;ctx.globalAlpha=a;ctx.drawImage(f[0],c[0],c[1],c[2],c[3],-dw/2,-dh,dw,dh)}groundFrame(frames[index],1-blend);groundFrame(frames[next],blend);ctx.globalAlpha=1;if(playing&&Math.sin(phase)>.82&&Math.random()<.32)particles.push({x:player.x+25,y:ground-8,vx:-2-Math.random()*3,vy:-Math.random(),life:16,c:'#ff4fe1'})}ctx.restore()}
const chibi=Array.from({length:8},(_,i)=>{let im=new Image();im.src=`assets/chibi-${i}.png`;return im}),chibiBox=[[79,99,290,377],[53,115,262,356],[18,106,277,368],[29,115,281,364],[67,13,280,348],[51,31,271,366],[22,112,287,290],[19,27,260,284]];
function drawChibi(i,x,bottom,scale){let b=chibiBox[i],w=b[2]*scale,h=b[3]*scale;ctx.drawImage(chibi[i],b[0],b[1],b[2],b[3],x-w/2,bottom-h,w,h)}
function drawPlayer(t){const scale=.38,cx=player.x+60;ctx.save();if(player.jumping){let bottom=player.y+player.h,rot=Math.max(-.08,Math.min(.08,player.vy*.006));ctx.translate(cx,bottom);ctx.rotate(rot);drawChibi(7,0,0,scale)}else if(player.duck){ctx.translate(cx+2,ground);drawChibi(6,0,0,scale)}else{let frame=Math.floor(t/Math.max(72,108-speed))%6;ctx.translate(cx,ground);drawChibi(frame,0,0,scale);if(playing&&frame===3&&Math.random()<.28)particles.push({x:player.x+25,y:ground-7,vx:-2-Math.random()*3,vy:-Math.random(),life:14,c:'#ff4fe1'})}ctx.restore()}
function collision(o){let px=player.x+27,pw=72,ph,py;if(player.duck){py=ground-55;ph=51;px=player.x+12;pw=108}else if(player.jumping){py=player.y+22;ph=82;px=player.x+24;pw=80}else{py=player.y+14;ph=104}return px<o.x+o.w&&px+pw>o.x&&py<o.y+o.h&&py+ph>o.y}
const oppositeImg=new Image();oppositeImg.src='assets/chibi-opposite.png';const oppositeBox=[348,122,750,708];
function drawTrimmed(image,b,x,bottom,height,alpha=1){let scale=height/b[3],w=b[2]*scale;ctx.globalAlpha=alpha;ctx.drawImage(image,b[0],b[1],b[2],b[3],x-w/2,bottom-height,w,height);ctx.globalAlpha=1}
function drawPlayer(t){const cx=player.x+60;ctx.save();if(player.jumping){ctx.translate(cx,player.y+player.h);ctx.rotate(Math.max(-.07,Math.min(.07,player.vy*.005)));drawTrimmed(chibi[7],chibiBox[7],0,0,122)}else if(player.duck){ctx.translate(cx+2,ground);drawTrimmed(chibi[6],chibiBox[6],0,0,110)}else{let frameTime=Math.max(105,155-speed*1.5),cycle=t/frameTime,p=cycle%1,second=Math.floor(cycle)%2===1,blend=Math.max(0,Math.min(1,(p-.78)/.22));ctx.translate(cx,ground);if(second){drawTrimmed(oppositeImg,oppositeBox,0,0,140,1-blend);drawTrimmed(chibi[0],chibiBox[0],0,0,140,blend)}else{drawTrimmed(chibi[0],chibiBox[0],0,0,140,1-blend);drawTrimmed(oppositeImg,oppositeBox,0,0,140,blend)}if(playing&&p>.48&&p<.55&&Math.random()<.28)particles.push({x:player.x+25,y:ground-7,vx:-2-Math.random()*3,vy:-Math.random(),life:14,c:'#ff4fe1'})}ctx.restore()}
function over(){playing=false;shake=14;best=Math.max(best,Math.floor(score));localStorage.setItem('neko-best',best);document.querySelector('#best').textContent=String(best).padStart(5,'0');document.querySelector('#kicker').textContent='SIGNAL LOST // GAME OVER';document.querySelector('#title').innerHTML='RUN <em>OVER</em>';document.querySelector('#message').innerHTML=`本次距离 <b style="color:#fff">${Math.floor(score)}m</b>　·　最高纪录 ${best}m<br>再试一次，打破你的夜跑纪录。`;document.querySelector('#start').textContent='重新出发　↻';setTimeout(()=>document.querySelector('#overlay').classList.remove('hidden'),350);beep(110,.28,'sawtooth')}
function frame(t){let dt=Math.min((t-last)/16.67||1,2);last=t;ctx.save();if(shake){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.85}let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#10132b');g.addColorStop(.52,'#2d1c47');g.addColorStop(.72,'#ff4f8b');g.addColorStop(.721,'#171020');ctx.fillStyle=g;ctx.fillRect(-20,-20,W+40,H+40);ctx.fillStyle='#fff';stars.forEach(s=>{s.x-=s.s*dt;if(s.x<0)s.x=W;ctx.globalAlpha=.3+s.r*.2;ctx.fillRect(s.x,s.y,s.r,s.r)});ctx.globalAlpha=1;city(t);ctx.fillStyle='#090a12';ctx.fillRect(0,ground,W,H-ground);ctx.strokeStyle='#baff4a55';for(let x=-(t*speed*.04%90);x<W;x+=90){ctx.beginPath();ctx.moveTo(x,ground);ctx.lineTo(x-90,H);ctx.stroke()}ctx.strokeStyle='#ff4fe133';for(let y=ground;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

<script>
// Delta Force-inspired ground obstacles: concrete cover, sonic trap and smoke mine.
const concreteWallImg=new Image(),sonicTrapImg=new Image(),smokeMineImg=new Image(),flashbangImg=new Image();
concreteWallImg.src='assets/concrete-wall.png';
sonicTrapImg.src='assets/sonic-trap.png';
smokeMineImg.src='assets/smoke-mine.png';
flashbangImg.src='assets/flying-flashbang-ball.png';
let smokeUntil=0,smokeSeed=0,smokeAnchor=null,flashUntil=0,lastLethalFormation=false;

const themedSpawnObstacle=window.spawnObstacle;
window.spawnObstacle=function(){
  const before=obstacles.length;
  themedSpawnObstacle();
  for(let i=before;i<obstacles.length;i++){
    const o=obstacles[i];
    const wasGround=['barrier','spike','orb','wall'].includes(o.type);
    // Normalize the total air/ground mix to roughly 50/50 from the start.
    const airBoost=score<180?.50:score<500?.17:.25;
    if(wasGround&&Math.random()<airBoost){
      if(Math.random()<.52){o.type='drone';o.w=70;o.h=34;o.y=ground-150}
      else{o.type='flashbang';o.w=52;o.h=52;o.y=ground-106;o.activated=false}
      continue;
    }
    if(o.type==='laser'){
      o.type='flashbang';o.w=52;o.h=52;o.y=ground-106;o.activated=false;
    }else if(['barrier','spike','orb','wall'].includes(o.type)){
      const roll=Math.random();
      if(roll<.38){
        o.type='concrete';o.w=76;o.h=105;o.y=ground-o.h;
      }else if(roll<.72){
        o.type='sonic';o.w=66;o.h=34;o.y=ground-o.h;o.activated=false;o.pulseStart=0;
      }else{
        o.type='smoke';o.w=52;o.h=30;o.y=ground-o.h;o.triggered=false;
      }
    }
  }
  const fresh=obstacles.slice(before);
  // Safe air/ground combinations. A lethal flying missile is paired only with
  // non-lethal smoke, while the non-lethal flashbang may accompany a jump obstacle.
  for(const air of fresh.filter(o=>o.type==='drone'||o.type==='flashbang')){
    if(Math.random()<.46){
      if(air.type==='drone')obstacles.push({x:air.x+28,y:ground-30,w:52,h:30,type:'smoke',triggered:false});
      else if(Math.random()<.5)obstacles.push({x:air.x+185,y:ground-105,w:76,h:105,type:'concrete'});
      else obstacles.push({x:air.x+185,y:ground-34,w:66,h:34,type:'sonic',activated:false,pulseStart:0});
    }
  }
  // Random formations: sometimes several obstacles share the screen, while
  // speed-based spacing always leaves enough time to finish the previous move.
  if(fresh.length){
    // Avoid repeatedly opening formations with concrete/sonic obstacles.
    if(lastLethalFormation&&['concrete','sonic'].includes(fresh[0].type)&&Math.random()<.78){
      Object.assign(fresh[0],{type:'smoke',w:52,h:30,y:ground-30,triggered:false});
    }
    const lead=fresh[0],safeGap=Math.max(310,speed*36);
    let cursor=lead.x,previousType=lead.type;
    for(let i=1;i<fresh.length;i++){
      cursor+=previousType==='smoke'?Math.max(safeGap,speed*65):safeGap;
      if(['concrete','sonic'].includes(previousType)&&['concrete','sonic'].includes(fresh[i].type)){
        Object.assign(fresh[i],{type:'smoke',w:52,h:30,y:ground-30,triggered:false});
      }
      fresh[i].x=cursor;previousType=fresh[i].type;
    }
    const difficulty=Math.min(1,score/1100),formationRoll=Math.random();
    const extraCount=formationRoll<.015+.045*difficulty?2:formationRoll<.10+.16*difficulty?1:0;
    for(let n=0;n<extraCount;n++){
      cursor+=previousType==='smoke'?Math.max(safeGap,speed*65):safeGap;
      const x=cursor;
      const type=['concrete','sonic'].includes(previousType)?'smoke':Math.random()<.56?'smoke':Math.random()<.55?'sonic':'concrete';
      if(type==='smoke')obstacles.push({x,y:ground-30,w:52,h:30,type,triggered:false});
      else if(type==='sonic')obstacles.push({x,y:ground-34,w:66,h:34,type,activated:false,pulseStart:0});
      else obstacles.push({x,y:ground-105,w:76,h:105,type});
      previousType=type;
    }
    // Disruption matters more when a lethal obstacle follows, but the gap is
    // scaled so the flash/smoke can clear before the obstacle becomes unavoidable.
    const formationNow=obstacles.slice(before);
    for(const d of formationNow.filter(o=>o.type==='smoke'||o.type==='flashbang')){
      const alreadyFollowed=formationNow.some(o=>o.x>d.x&&['concrete','sonic'].includes(o.type));
      if(!alreadyFollowed){
        const followX=d.x+Math.max(440,speed*58);
        if(Math.random()<.5)obstacles.push({x:followX,y:ground-105,w:76,h:105,type:'concrete'});
        else obstacles.push({x:followX,y:ground-34,w:66,h:34,type:'sonic',activated:false,pulseStart:0});
      }
    }
    // Final fairness pass: two lethal hazards must never overlap or demand
    // conflicting actions before the previous jump/duck has fully recovered.
    const lethalTypes=new Set(['concrete','sonic','drone']),newSet=new Set(obstacles.slice(before));
    const lethalNew=obstacles.filter(o=>lethalTypes.has(o.type)&&o.x>player.x).sort((a,b)=>a.x-b.x);
    const recoveryGap=Math.max(540,speed*58);
    for(let i=1;i<lethalNew.length;i++){
      if(newSet.has(lethalNew[i])&&lethalNew[i].x-lethalNew[i-1].x<recoveryGap)lethalNew[i].x=lethalNew[i-1].x+recoveryGap;
    }
    lastLethalFormation=['concrete','sonic'].includes(previousType)||fresh.some(o=>['concrete','sonic'].includes(o.type));
  }
  // The next formation interval deliberately varies, but tightens gradually.
  spawn=Math.max(48,105+Math.random()*75-Math.min(score/14,55));
};

const themedObstacleRenderer=window.drawObstacle;
window.drawObstacle=function(o){
  if(!['concrete','sonic','smoke','flashbang'].includes(o.type)){
    if(o.type==='drone'&&playing)o.x-=speed*.18;
    themedObstacleRenderer(o);return
  }
  if(o.type==='smoke'&&o.triggered)return;
  ctx.save();
  if(o.type==='flashbang'){
    ctx.shadowBlur=18;ctx.shadowColor='#8eefff';
    ctx.drawImage(flashbangImg,253,211,762,755,o.x,o.y,o.w,o.h);ctx.restore();return;
  }
  const img=o.type==='concrete'?concreteWallImg:o.type==='sonic'?sonicTrapImg:smokeMineImg;
  const source=o.type==='concrete'?[126,265,1425,475]:o.type==='sonic'?[310,102,915,778]:[81,262,1059,648];
  const pad=o.type==='concrete'?12:o.type==='sonic'?10:8;
  ctx.shadowBlur=o.type==='concrete'?10:18;
  ctx.shadowColor=o.type==='sonic'?'#35dfff':o.type==='smoke'?'#ff5b35':'#ff9c35';
  ctx.drawImage(img,...source,o.x-pad,o.y-pad,o.w+pad*2,o.h+pad*2);
  if(o.type==='sonic'&&o.activated){
    const age=Math.max(0,performance.now()-o.pulseStart),pulse=(age%420)/420;
    ctx.globalAlpha=.9;
    ctx.strokeStyle='#48eaff';ctx.lineWidth=5;ctx.shadowBlur=20;ctx.shadowColor='#33dfff';
    for(let i=0;i<3;i++){
      const p=(pulse+i/3)%1;
      ctx.globalAlpha=.85*(1-p)+.12;
      ctx.beginPath();ctx.ellipse(o.x+o.w/2,ground-32,38+p*58,25+p*48,0,Math.PI,Math.PI*2);ctx.stroke();
    }
  }
  ctx.restore();
};

const themedCollision=window.collision;
window.collision=function(o){
  const hit=themedCollision(o);
  if(o.type==='flashbang'){
    if(!o.activated&&o.x-player.x<265&&o.x-player.x>20){
      o.activated=true;beep(880,.1,'square');
      if(!player.duck)flashUntil=performance.now()+1000;
    }
    return false;
  }
  if(o.type==='sonic'){
    // The trap always emits before the runner reaches it, even during a jump.
    if(!o.activated&&o.x-player.x<255&&o.x-player.x>15){o.activated=true;o.pulseStart=performance.now();beep(245,.12,'square')}
    if(o.activated){
      const px=player.x+24,pw=80;
      const py=player.duck?ground-55:player.y+18,ph=player.duck?51:player.jumping?78:102;
      const fx=o.x-32,fy=ground-92,fw=o.w+64,fh=92;
      if(px<fx+fw&&px+pw>fx&&py<fy+fh&&py+ph>fy)return true;
    }
    return hit;
  }
  const nearSmoke=o.type==='smoke'&&!o.triggered&&
    o.x-player.x<165&&o.x+o.w-player.x>-35;
  if(nearSmoke){
    if(!o.triggered){
      o.triggered=true;smokeUntil=performance.now()+1000;smokeSeed=Math.random()*1000;smokeAnchor=o;
      beep(150,.16,'sawtooth');
      for(let i=0;i<22;i++)particles.push({x:o.x+o.w/2,y:o.y+8,vx:(Math.random()-.5)*5,vy:-1-Math.random()*4,life:35,c:'#b9bbc2'});
    }
    return false;
  }
  if(o.type==='smoke')return false;
  return hit;
};

const themedPlayerRenderer=window.drawPlayer;
window.drawPlayer=function(t){
  themedPlayerRenderer(t);
  if(t<smokeUntil&&smokeAnchor){
    const remain=Math.min(1,(smokeUntil-t)/180),fadeIn=Math.min(1,(1000-(smokeUntil-t))/120),alpha=Math.min(remain,fadeIn);
    ctx.save();const cloudX=smokeAnchor.x+smokeAnchor.w/2,cloudY=ground-135;
    ctx.globalAlpha=alpha;ctx.fillStyle='#41444b';ctx.beginPath();ctx.ellipse(cloudX,cloudY,310,235,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<32;i++){const angle=i*2.399+smokeSeed,drift=Math.sin(t*.0018+i)*18,x=cloudX+Math.cos(angle)*(155+i%4*30)+drift,y=cloudY+Math.sin(angle)*(105+i%3*27)-Math.sin(t*.001+i)*14,r=82+(i%5)*17;ctx.fillStyle=i%3===0?'#585b63':i%3===1?'#383b42':'#494c54';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=.88*alpha;ctx.fillStyle='#d9dbe0';ctx.font='700 12px ui-monospace,monospace';ctx.textAlign='center';ctx.fillText('SMOKE',cloudX,cloudY-8);ctx.restore();
  }
  if(t<flashUntil){
    const left=flashUntil-t,alpha=Math.min(.96,Math.min((1000-left)/70,left/150));
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#f7fbff';ctx.fillRect(0,0,W,H);ctx.globalAlpha=.9*alpha;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(W*.5,H*.45,Math.max(W,H)*.38,0,Math.PI*2);ctx.fill();ctx.restore();
  }
};

const defeatCg=document.createElement('img');defeatCg.className='defeat-cg';defeatCg.alt='战败 CG';defeatCg.hidden=true;
defeatOverlay.insertBefore(defeatCg,defeatCard);
let lastDefeatCg=-1;
const originalOver=window.over;
window.over=function(){
  originalOver();
  let pick=Math.floor(Math.random()*9);if(pick===lastDefeatCg)pick=(pick+1)%9;lastDefeatCg=pick;
  defeatCg.src=`assets/defeat-${pick}.webp`;defeatCg.hidden=false;defeatOverlay.classList.add('defeat-mode');
};
document.querySelector('#start').addEventListener('click',()=>{defeatOverlay.classList.remove('defeat-mode');defeatCg.hidden=true});
</script></body></html>
